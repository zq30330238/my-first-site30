<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
:root {
  --bg: #1e1e1e;
  --panel: #252526;
  --border: #3e3e42;
  --text: #cccccc;
  --accent: #0098ff;
  --user: #094771;
  --claude: #37373d;
  --dim: #858585;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;
  user-select:none;
}
.header{
  padding:10px 16px;background:var(--panel);
  border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--dim);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.dot{width:7px;height:7px;border-radius:50%;background:#4ec94e}
.dot.waiting{background:#f0ad4e;animation:blink .8s infinite}
@keyframes blink{50%{opacity:.3}}
#messages{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:8px;
}
.msg{
  max-width:85%;padding:8px 12px;border-radius:8px;
  font-size:13px;line-height:1.55;
  word-break:break-word;
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:var(--user)}
.msg.claude{align-self:flex-start;background:var(--claude)}
.msg.system{align-self:center;color:var(--dim);font-size:11px;background:transparent}

.controls{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:var(--panel);flex-shrink:0;
}
#micBtn{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--border);
  background:transparent;color:var(--text);
  font-size:20px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
#micBtn:hover{border-color:var(--accent)}
#micBtn.listening{
  background:var(--accent);border-color:var(--accent);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,152,255,.4)}50%{box-shadow:0 0 0 12px rgba(0,152,255,0)}}
#status{font-size:12px;color:var(--dim);flex:1}
#inputBox{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:8px 12px;color:var(--text);
  font-size:13px;outline:none;resize:none;font-family:inherit;
}
#sendBtn{
  background:var(--accent);color:#fff;border:none;
  padding:8px 16px;border-radius:6px;cursor:pointer;
  font-size:13px;font-weight:600;
}
#sendBtn:hover{opacity:.85}
#sendBtn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>

<div class="header">
  <span class="dot" id="dot"></span>  · DeepSeek
</div>

<div id="messages">
  <div class="msg system">  </div>
</div>

<div class="controls">
  <button id="micBtn" onclick="toggleMic()" title=""></button>
  <span id="status"></span>
  <input id="inputBox" placeholder="..." onkeydown="if(event.key==='Enter')sendText()">
  <button id="sendBtn" onclick="sendText()"></button>
</div>

<audio id="audioPlayer" style="display:none"></audio>

<script>
const micBtn = document.getElementById('micBtn');
const status = document.getElementById('status');
const inputBox = document.getElementById('inputBox');
const messages = document.getElementById('messages');
const dot = document.getElementById('dot');
const audioPlayer = document.getElementById('audioPlayer');
const BRIDGE = 'http://127.0.0.1:9876';

let recognition = null;
let listening = false;
let pollTimer = null;
let audioPollTimer = null;
let lastResponse = '';
let audioPlayed = false;

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    status.textContent = '';
    micBtn.disabled = true;
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    let text = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      text += e.results[i][0].transcript;
    }
    inputBox.value = text;
  };

  recognition.onerror = (e) => {
    console.log('Speech error:', e.error);
    if (e.error === 'not-allowed') {
      status.textContent = '';
    } else if (e.error === 'no-speech') {
      status.textContent = '';
    } else if (e.error === 'network') {
      status.textContent = '';
    } else {
      status.textContent = ': ' + e.error;
    }
    stopListening();
  };

  recognition.onend = () => {
    console.log('Speech onend, listening=', listening);
    if (listening) {
      // 
      const text = inputBox.value.trim();
      if (text) {
        navigator.clipboard.writeText(text).catch(() => {});
        fetch(BRIDGE + '/speech', {
          method: 'POST',
          headers: {'Content-Type': 'application/json; charset=utf-8'},
          body: JSON.stringify({text: text})
        }).catch(() => {});
        addMessage(text, 'user');
        inputBox.value = '';
        status.textContent = 'Ctrl+V ';
        dot.classList.add('waiting');
        startPolling();
      }
      stopListening();
    }
  };
}

function toggleMic() {
  if (!recognition) initRecognition();
  if (!recognition) return;
  listening ? stopListening() : startListening();
}

function startListening() {
  listening = true;
  micBtn.classList.add('listening');
  micBtn.textContent = '';
  status.textContent = '...';
  inputBox.value = '';
  lastResponse = '';
  audioPlayed = false;
  try {
    recognition.start();
    console.log('Recognition started OK');
  } catch(ex) {
    console.log('Recognition start error:', ex);
    status.textContent = ': ' + (ex.message || ex);
    listening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '';
  }
}

function stopListening() {
  listening = false;
  micBtn.classList.remove('listening');
  micBtn.textContent = '';
  status.textContent = '';
  dot.classList.remove('waiting');
  try { recognition.stop(); } catch(e) {}
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text.slice(0, 1000);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendText() {
  const text = inputBox.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  inputBox.value = '';
  if (listening) stopListening();

  try {
    await fetch(BRIDGE + '/speech', {
      method: 'POST',
      headers: {'Content-Type': 'application/json; charset=utf-8'},
      body: JSON.stringify({text: text})
    });
  } catch(e) {}

  status.textContent = 'Claude ...';
  dot.classList.add('waiting');
  audioPlayed = false;
  startPolling();
}

//  + TTS
async function pollResponse() {
  try {
    const res = await fetch(BRIDGE + '/poll');
    if (res.status === 200) {
      const data = await res.json();
      if (data.text && data.text !== lastResponse) {
        lastResponse = data.text;
        addMessage(data.text, 'claude');
        status.textContent = '';
        dot.classList.remove('waiting');
        stopPolling();

        // TTS
        speakFast(data.text);

        // Edge
        if (!audioPlayed) {
          startAudioPolling();
        }
      }
    }
  } catch(e) {}
}

// TTS —— 
function speakFast(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.1;
  u.pitch = 1.1;
  u.volume = 0.9;
  // 
  const voices = window.speechSynthesis.getVoices();
  const male = voices.find(v => v.lang.startsWith('zh') && (v.name.includes('Male') || v.name.includes('Kangkang')));
  if (male) u.voice = male;
  window.speechSynthesis.speak(u);
}

// EdgeMP3
function startAudioPolling() {
  stopAudioPolling();
  audioPollTimer = setInterval(async () => {
    try {
      const res = await fetch(BRIDGE + '/audio-ready');
      if (res.status === 200) {
        stopAudioPolling();
        audioPlayed = true;
        // TTS
        window.speechSynthesis.cancel();
        // Edge
        audioPlayer.src = BRIDGE + '/audio.mp3?t=' + Date.now();
        audioPlayer.play().catch(() => {});
      }
    } catch(e) {}
  }, 500);
}

function stopAudioPolling() {
  if (audioPollTimer) { clearInterval(audioPollTimer); audioPollTimer = null; }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollResponse, 600);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

initRecognition();
</script>
</body>
</html>
