name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'sub-healthy/**'
      - 'sub-pets/**'
      - 'sub-home/**'
      - 'sub-finance/**'
      - 'sub-tech/**'
      - 'sub-travel/**'
      - 'main-site/**'
      - 'shared/**'

jobs:
  deploy-healthy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish healthy-jycsd
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 4e8cd083c07627f679dd86dc5b488fb0
          projectName: healthy-jycsd
          directory: sub-healthy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-pets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
